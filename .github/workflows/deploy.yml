name: Deploy to VS Code Market place

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run package

      - name: Package by vsce
        run: npx vsce package
      - uses: actions/upload-artifact@v4
        with:
          path: "*.vsix"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/download-artifact@v4
      - run: npx vsce publish --packagePath $(find . -iname *.vsix)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}